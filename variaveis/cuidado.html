<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="expor()">Expor JavaScript</button>
    
    <script>

        function expor(){
            let orfao;

            console.log(typeof orfao)

            let numero = 10;
            console.log("O tipo do número é " + typeof numero)

            numero = 10 + "R$"

            console.log("O novo tipo é " + typeof numero)

            console.log(10 / numero)


        }

    </script>
</body>
</html>
