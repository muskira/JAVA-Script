<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Calculadora de soma</h1>
    <label for="numUm">Primeiro número</label>
    <input id="numUm" type="number" placeholder="Digite um número">

    <label for="numDois">Segundo número</label>
    <input id="numDois" type="number" placeholder="Digite um número">

    <button onclick="somar()">Somar</button>
    
    <h2>Resultado: <span id="resultado">0</span></h2>


    <script>
        function somar(){
            let numUm = document.getElementById("numUm").value;
            let numDois = document.getElementById("numDois").value;
            let soma = Number(numUm) + Number(numDois)
            
            document.getElementById("resultado").innerHTML = soma
        }
    </script>
    
</body>
</html>
