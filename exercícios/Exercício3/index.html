<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Login Simples</title>
</head>
<body>
    <h1>SISTEMA DE LOGIN SIMPLES</h1>

    <label for="usuario">Usuário:</label>
    <input type="text" id="usuario" placeholder="Digite seu usuário" />
    <br />

    <label for="senha">Senha:</label>
    <input type="password" id="senha" placeholder="Digite sua senha" />
    <br />

    <button onclick="login()">Entrar</button>

    <h2>
        Resultado: <span id="resultado"></span>
    </h2>

    <script>
        // valores fixos (exemplo)
        const usuarioFixo = "Chagas";
        const senhaFixa = "28031979";

        function login() {
            // Lê os valores digitados
            const usuarioDigitado = document.getElementById("usuario").value;
            const senhaDigitada = document.getElementById("senha").value;

            // Comparação de strings com if/else
            if (usuarioDigitado === usuarioFixo && senhaDigitada === senhaFixa) {
                document.getElementById("resultado").innerHTML = 
                "Login realizado com sucesso! ✅";
            } else {
                document.getElementById("resultado").innerHTML = 
                "Usuário ou senha inválidos. ❌";
            }
        }
    </script>
</body>
</html>
